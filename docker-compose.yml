version: '3.8'

services:
  # PostgreSQL - Primary Database
  postgres:
    image: postgres:16-alpine
    container_name: hypurrscan-postgres
    environment:
      POSTGRES_USER: hypurrscan
      POSTGRES_PASSWORD: hypurrscan123
      POSTGRES_DB: hypurrscan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hypurrscan"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis - Cache & Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: hypurrscan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ClickHouse - Analytics
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: hypurrscan-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  # Backend API
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: hypurrscan-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://hypurrscan:hypurrscan123@postgres:5432/hypurrscan
      - REDIS_URL=redis://redis:6379
      - CLICKHOUSE_URL=http://clickhouse:8123
      - PORT=3001
      - HYPERLIQUID_RPC=https://rpc.hyperliquid.xyz
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  # Indexer Worker
  indexer:
    build:
      context: ./apps/indexer
      dockerfile: Dockerfile
    container_name: hypurrscan-indexer
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://hypurrscan:hypurrscan123@postgres:5432/hypurrscan
      - REDIS_URL=redis://redis:6379
      - HYPERLIQUID_RPC=https://rpc.hyperliquid.xyz
      - HYPERLIQUID_WS=wss://rpc.hyperliquid.xyz/ws
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./apps/indexer:/app
      - /app/node_modules

  # Frontend (Next.js)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: hypurrscan-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
